<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Password Generator Scaler</title>
  </head>
  <body>
    <div class="container">
      <h2>Generate a Random Password</h2>
      <div class="result_container">
        <span id="result" class="result"></span>
        <button class="btn" id="clipboard">copy to clipboard</button>
      </div>

      <div class="settings">
        <!-- <div class="setting">
             <lable>Password Length</lable>
             <input type="number" id='length' min= max="20" value="20" />
             </div> -->
        <div class="setting">
          <label for="length"
            >Password Length:
            <span id="lengthValue">20</span>
          </label>

          <input type="range" id="length" min="6" max="20" value="20" />
        </div>
        <div class="setting">
          <lable>include Uppercase</lable>
          <input type="checkbox" id="uppercase" checked />
        </div>

        <div class="setting">
          <lable>include Lowercase</lable>
          <input type="checkbox" id="lowercase" checked />
        </div>

        <div class="setting">
          <lable>include Number</lable>
          <input type="checkbox" id="number" checked />
        </div>

        <div class="setting">
          <lable>include Symbols</lable>
          <input type="checkbox" id="symbol" checked />
        </div>
      </div>
      <button class="btn btn-large" id="generate">Generate Password</button>
    </div>
  </body>
  <script src="script.js"></script>
</html>
